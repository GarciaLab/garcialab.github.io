name: "PR Preview Deployment"

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pages: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: gemfile

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-source

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: pr-source

      - name: Build PR Preview
        working-directory: pr-source
        run: |
          bundle exec jekyll build \
            --destination ../preview-site \
            --baseurl "/previews/pr-${{ github.event.number }}"

      - name: Checkout master for publishing
        uses: actions/checkout@v4
        with:
          ref: master
          path: publish-target
          fetch-depth: 0

      - name: Publish PR Preview
        working-directory: publish-target
        run: |
          rm -rf previews/pr-${{ github.event.number }}
          mkdir -p previews/pr-${{ github.event.number }}
          rsync -av --delete ../preview-site/ previews/pr-${{ github.event.number }}/

          git add previews/pr-${{ github.event.number }}
          if git diff --cached --quiet; then
            echo "No preview changes to publish."
            exit 0
          fi
          git config --local user.name "GitHub Actions"
          git config --local user.email "github-actions@github.com"
          git commit -m "Deploy preview for PR #${{ github.event.number }}"
          git push origin master

      - name: Post Preview Link in PR
        uses: mshick/add-pr-comment@v2
        with:
          message: "PR preview is live: [https://garcialab.berkeley.edu/previews/pr-${{ github.event.number }}/](https://garcialab.berkeley.edu/previews/pr-${{ github.event.number }}/)"

  cleanup-preview:
    if: github.event.action == 'closed'
    name: Cleanup PR Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Delete PR Preview
        run: |
          git rm -rf previews/pr-${{ github.event.number }} || true
          if git diff --cached --quiet; then
            echo "No preview files to remove."
            exit 0
          fi

          git config --local user.name "GitHub Actions"
          git config --local user.email "github-actions@github.com"
          git commit -m "Remove preview for PR #${{ github.event.number }}"
          git push origin master

      - name: Comment on PR About Cleanup
        uses: mshick/add-pr-comment@v2
        with:
          message: "PR preview has been removed since the PR was closed."
